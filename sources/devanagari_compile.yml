datasets:
  - name: hplt_deva
    repo: HPLT/HPLT2.0_cleaned
    kind: hplt
    enabled: true
    configs:
      - npi_Deva
      - hin_Deva
      - mar_Deva
      - mai_Deva
      - san_Deva
      - bho_Deva
      - awa_Deva
      - mag_Deva
      - hne_Deva
      - kas_Deva
    splits:
      - train

  - name: c4_deva
    repo: allenai/c4
    kind: c4
    enabled: true
    configs:
      - hi
      - ne
      - mr
    splits:
      - train

  - name: culturax_deva
    repo: uonlp/CulturaX
    kind: culturax
    enabled: true
    configs:
      - bh
      - gom
      - hi
      - mai
      - new
      - sa
    splits:
      - train
    filters:
      source_exclude:
        - mC4

